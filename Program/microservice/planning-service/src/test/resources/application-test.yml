# Test profile overrides (overlaid on top of the main application.yml).
#
# Tests run against an in-memory H2 database. Flyway is disabled here because
# the production migrations under db/migration use PostgreSQL-specific syntax
# (dollar-quoted DO blocks, bytea, etc.); for tests we let Hibernate build the
# schema directly from the entities instead.
spring:
  datasource:
    url: jdbc:h2:mem:planningdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  sql:
    init:
      mode: never

# Dummy HS256 signing secret so the SecurityConfig jwtDecoder bean can be built in tests
# (the main config reads ${JWT_SECRET}, which is only set at runtime). Base64 that decodes
# to >32 bytes as HS256 requires; not a real/production key.
jwt:
  secret: cGxhbm5pbmctc2VydmljZS11bml0LXRlc3QtaG1hYy1zZWNyZXQta2V5LTAxMjM0NTY3ODk=
