# Image-mode variant of paradepaard.conf (used by docker-compose.registry.yml).
# Identical to paradepaard.conf EXCEPT the frontend is proxied to the `frontend`
# container instead of being served from a mounted dist folder. TLS termination,
# redirects, security headers, and the /api /auth /api-docs gateway proxying are
# unchanged.
server {
    listen 80;
    server_name _;

    return 308 https://$host$request_uri;
}

# Send www to the bare domain so the app only ever sees one origin.
server {
    listen 443 ssl;
    http2 on;
    server_name www.lambdamanager.com;

    ssl_certificate /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 308 https://lambdamanager.com$request_uri;
}

server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Forwarded headers so the gateway/services see the original HTTPS request.
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;

    # The gateway's auth responses carry large Set-Cookie headers (JWT access + refresh
    # cookies), which overflow nginx's default 8k header buffer and cause a 502
    # ("upstream sent too big header"). Give the response-header buffer more room.
    proxy_buffer_size 32k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;

    # --- API + auth → api-gateway ---
    location /api/ {
        proxy_pass http://api-gateway:4004;
        proxy_buffering off;        # keep Server-Sent Events (messaging) flowing
        proxy_read_timeout 3600s;
    }
    location /auth/ {
        proxy_pass http://api-gateway:4004;
    }
    location /api-docs/ {
        proxy_pass http://api-gateway:4004;
    }

    # --- Frontend (React SPA) → its own nginx container ---
    # The frontend image serves the static build and does its own SPA fallback,
    # so we just forward everything else to it.
    location / {
        proxy_pass http://frontend:80;
    }
}
