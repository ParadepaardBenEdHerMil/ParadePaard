syntax = "proto3";

option java_multiple_files = true;
option java_package = "user";

service UserService {
  rpc RequestUserData (UserDataRequest) returns (UserDataResponse);
  // Approved leave hours for an employee within an inclusive date range, split paid/unpaid.
  rpc GetApprovedLeaveHours (LeaveHoursRequest) returns (LeaveHoursResponse);
  // Whether an employee has any approved leave overlapping an inclusive date range.
  rpc HasApprovedLeaveOverlap (LeaveOverlapRequest) returns (LeaveOverlapResponse);
}

message LeaveHoursRequest {
  string userId = 1;
  string fromDate = 2; // inclusive ISO yyyy-MM-dd
  string toDate = 3;   // inclusive ISO yyyy-MM-dd
}

message LeaveHoursResponse {
  string paidLeaveHours = 1;   // holiday/other paid at full rate (decimal string)
  string unpaidLeaveHours = 2; // decimal string
  string sickLeaveHours = 3;   // sick leave, paid at its own rate (decimal string)
}

message LeaveOverlapRequest {
  string userId = 1;
  string fromDate = 2;
  string toDate = 3;
}

message LeaveOverlapResponse {
  bool hasOverlap = 1;
}

message UserDataRequest {
  string userId = 1;
}

message UserDataResponse {
  string name = 1;
  string dateOfBirth = 2;
  string streetName = 3;
  string houseNumber = 4;
  string houseNumberSuffix = 5;
  string postalCode = 6;
  string city = 7;
  string country = 8;
  string preferredName = 9;
  string firstNames = 10;
  string middleNamePrefix = 11;
  string lastName = 12;
  string gender = 13;
  string email = 14;
  string mobileNumber = 15;
  string iban = 16;
  string companyId = 17;
  string bsn = 18;
  bool applyLoonheffingskorting = 19;
  bool pensionParticipant = 20;
  bool specialZvwContribution = 21;
  string payrollNotes = 22;
}
