spring.application.name=user-service
# Flyway owns schema/data (sql.init.mode=never), so deferring datasource init is not
# needed and it creates a Flyway<->entityManagerFactory depends-on cycle. Keep it off.
spring.jpa.defer-datasource-initialization=false
spring.jpa.open-in-view=false
server.port=4006
grpc.server.port=9006
logging.level.root=info

# Kafka consumer uses plain byte array
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

auth.service.base-url=http://localhost:4004
auth.service.address=localhost
auth.service.grpc.port=9005
contract.service.base-url=http://localhost:4004

# ID-document upload posts two images (front + back) in a single request, and phone
# photos are commonly several MB, so the old 2 MB request cap rejected normal uploads.
# max-request-size must comfortably hold two full-size images; max-swallow-size is raised
# so an over-limit request still drains and returns a clean 413 instead of a reset
# connection surfacing as a generic "server error".
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=30MB
server.tomcat.max-swallow-size=30MB
