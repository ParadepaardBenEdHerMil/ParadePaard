spring.application.name=payroll-service
spring.jpa.defer-datasource-initialization=true
server.port=4000

# Sick-leave pay as a percentage of the hourly wage (leave -> payroll feed).
# Horeca CAO (bijlage 3): 95% in the first 52 weeks of illness, 75% in the following 52 weeks,
# with the first sick day a wachtdag (unpaid). This single value applies the first-year rate,
# which covers ordinary short-term sickness; long-term (>52 wk) tiering and the wachtdag are not
# yet modelled. Source: dehorecabond.nl/cao-horeca/ziekte-en-verlof.
payroll.sick-leave-pay-percentage=95
