jwt:
    secret: ${JWT_SECRET}

spring:
  jpa:
    hibernate:
      # Schema is owned by Flyway. Hibernate only validates that the entities
      # match the migrated schema; it never alters the database.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate stamps a pre-existing (Hibernate-created) schema as
    # version 1 so V1 is not re-run against it; fresh databases run every
    # migration from V1.
    baseline-on-migrate: true
    baseline-version: 1

logging:
  level:
    org.springframework.security: ${SPRING_SECURITY_LOG_LEVEL:INFO}
    org.springframework.web: ${SPRING_WEB_LOG_LEVEL:INFO}
    com.pm.authservice.security: ${AUTH_SECURITY_LOG_LEVEL:INFO}
    ROOT: ${ROOT_LOG_LEVEL:INFO}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
