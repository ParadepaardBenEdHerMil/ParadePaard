services:
  auth-service-db:
    image: postgres:16.4
    environment:
      POSTGRES_DB: db
      POSTGRES_PASSWORD: "${AUTH_SERVICE_DB_PASSWORD:?AUTH_SERVICE_DB_PASSWORD must be set}"
      POSTGRES_USER: admin_user
    ports: ["5001:5432"]
    volumes: ["auth_db_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d db"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service-db:
    image: postgres:16.4
    environment:
      POSTGRES_DB: db
      POSTGRES_PASSWORD: "${USER_SERVICE_DB_PASSWORD:?USER_SERVICE_DB_PASSWORD must be set}"
      POSTGRES_USER: admin_user
    ports: ["5002:5432"]
    volumes: ["user_db_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d db"]
      interval: 10s
      timeout: 5s
      retries: 5

  payroll-service-db:
    image: postgres:16.4
    environment:
      POSTGRES_DB: db
      POSTGRES_PASSWORD: "${PAYROLL_SERVICE_DB_PASSWORD:?PAYROLL_SERVICE_DB_PASSWORD must be set}"
      POSTGRES_USER: admin_user
    ports: ["5000:5432"]
    volumes: ["payroll_db_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d db"]
      interval: 10s
      timeout: 5s
      retries: 5

  timesheet-service-db:
    image: postgres:16.4
    environment:
      POSTGRES_DB: db
      POSTGRES_PASSWORD: "${TIMESHEET_SERVICE_DB_PASSWORD:?TIMESHEET_SERVICE_DB_PASSWORD must be set}"
      POSTGRES_USER: admin_user
    ports: ["5003:5432"]
    volumes: ["timesheet_db_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d db"]
      interval: 10s
      timeout: 5s
      retries: 5

  contract-service-db:
    image: postgres:16.4
    environment:
      POSTGRES_DB: db
      POSTGRES_PASSWORD: "${CONTRACT_SERVICE_DB_PASSWORD:?CONTRACT_SERVICE_DB_PASSWORD must be set}"
      POSTGRES_USER: admin_user
    ports: ["5004:5432"]
    volumes: ["contract_db_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d db"]
      interval: 10s
      timeout: 5s
      retries: 5

  planning-service-db:
    image: postgres:16.4
    environment:
      POSTGRES_DB: db
      POSTGRES_PASSWORD: "${PLANNING_SERVICE_DB_PASSWORD:?PLANNING_SERVICE_DB_PASSWORD must be set}"
      POSTGRES_USER: admin_user
    ports: ["5005:5432"]
    volumes: ["planning_db_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d db"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:4.1.2
    environment:
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_NODE_ID: "0"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
    ports: ["9092:9092", "9094:9094"]

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    image: auth-service:latest
    environment:
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      # B7: first-admin bootstrap. Set these once to create the initial SUPER_ADMIN;
      # it is forced to change its password on first login. Leave unset to skip.
      BOOTSTRAP_ADMIN_USERNAME: "${BOOTSTRAP_ADMIN_USERNAME:-}"
      BOOTSTRAP_ADMIN_EMAIL: "${BOOTSTRAP_ADMIN_EMAIL:-}"
      BOOTSTRAP_ADMIN_PASSWORD: "${BOOTSTRAP_ADMIN_PASSWORD:-}"
      PASSWORD_RESET_FRONTEND_URL: "${PASSWORD_RESET_FRONTEND_URL:-http://localhost:5173/reset-password}"
      PASSWORD_RESET_HMAC_SECRET: "${PASSWORD_RESET_HMAC_SECRET:?PASSWORD_RESET_HMAC_SECRET must be set}"
      SES_SMTP_HOST: "${SES_SMTP_HOST:-email-smtp.eu-north-1.amazonaws.com}"
      SES_SMTP_PORT: "${SES_SMTP_PORT:-587}"
      SES_SMTP_USERNAME: "${SES_SMTP_USERNAME:?SES_SMTP_USERNAME must be set}"
      SES_SMTP_PASSWORD: "${SES_SMTP_PASSWORD:?SES_SMTP_PASSWORD must be set}"
      SES_FROM_EMAIL: "${SES_FROM_EMAIL:-noreply@lambdamanager.com}"
      SPRING_DATASOURCE_PASSWORD: "${AUTH_SERVICE_DB_PASSWORD:?AUTH_SERVICE_DB_PASSWORD must be set}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://auth-service-db:5432/db"
      SPRING_DATASOURCE_USERNAME: "admin_user"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      SPRING_SQL_INIT_MODE: "never"
    depends_on: [auth-service-db, kafka]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4005/actuator/health/readiness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    image: user-service:latest
    environment:
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      # S1: shared secret authenticating service-to-service calls to /users/public/**.
      INTERNAL_SERVICE_TOKEN: "${INTERNAL_SERVICE_TOKEN:-}"
      AUTH_SERVICE_BASE_URL: "http://api-gateway:4004"
      AUTH_SERVICE_ADDRESS: "auth-service"
      AUTH_SERVICE_GRPC_PORT: "9005"
      CONTRACT_SERVICE_BASE_URL: "http://api-gateway:4004"
      SPRING_DATASOURCE_PASSWORD: "${USER_SERVICE_DB_PASSWORD:?USER_SERVICE_DB_PASSWORD must be set}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://user-service-db:5432/db"
      SPRING_DATASOURCE_USERNAME: "admin_user"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      SPRING_SQL_INIT_MODE: "never"
    depends_on: [user-service-db, kafka, api-gateway]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4006/actuator/health/readiness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  timesheet-service:
    build:
      context: ./timesheet-service
      dockerfile: Dockerfile
    image: timesheet-service:latest
    environment:
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      SPRING_DATASOURCE_PASSWORD: "${TIMESHEET_SERVICE_DB_PASSWORD:?TIMESHEET_SERVICE_DB_PASSWORD must be set}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://timesheet-service-db:5432/db"
      SPRING_DATASOURCE_USERNAME: "admin_user"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
      SPRING_SQL_INIT_MODE: "never"
    depends_on: [timesheet-service-db]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4001/actuator/health/readiness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  contract-service:
    build:
      context: ./contract-service
      dockerfile: Dockerfile
    image: contract-service:latest
    environment:
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      SPRING_DATASOURCE_PASSWORD: "${CONTRACT_SERVICE_DB_PASSWORD:?CONTRACT_SERVICE_DB_PASSWORD must be set}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://contract-service-db:5432/db"
      SPRING_DATASOURCE_USERNAME: "admin_user"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
      SPRING_SQL_INIT_MODE: "never"
      USER_SERVICE_ADDRESS: "user-service"
      USER_SERVICE_GRPC_PORT: "9006"
      USER_SERVICE_BASE_URL: "http://user-service:4006"
      CONTRACT_EMAIL_CONTRACT_URL: "${CONTRACT_EMAIL_CONTRACT_URL:-http://localhost:5173/account/employment}"
      SES_SMTP_HOST: "${SES_SMTP_HOST:-email-smtp.eu-north-1.amazonaws.com}"
      SES_SMTP_PORT: "${SES_SMTP_PORT:-587}"
      SES_SMTP_USERNAME: "${SES_SMTP_USERNAME:?SES_SMTP_USERNAME must be set}"
      SES_SMTP_PASSWORD: "${SES_SMTP_PASSWORD:?SES_SMTP_PASSWORD must be set}"
      SES_FROM_EMAIL: "${SES_FROM_EMAIL:-noreply@lambdamanager.com}"
    depends_on: [contract-service-db, user-service, kafka]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4002/actuator/health/readiness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  planning-service:
    build:
      context: ./planning-service
      dockerfile: Dockerfile
    image: planning-service:latest
    environment:
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      # S1: token sent on calls to user-service /public/** (must match user-service).
      INTERNAL_SERVICE_TOKEN: "${INTERNAL_SERVICE_TOKEN:-}"
      TIMESHEET_SERVICE_ADDRESS: "timesheet-service"
      TIMESHEET_SERVICE_GRPC: "9001"
      USER_SERVICE_BASE_URL: "http://user-service:4006"
      SPRING_DATASOURCE_PASSWORD: "${PLANNING_SERVICE_DB_PASSWORD:?PLANNING_SERVICE_DB_PASSWORD must be set}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://planning-service-db:5432/db"
      SPRING_DATASOURCE_USERNAME: "admin_user"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
      SPRING_SQL_INIT_MODE: "never"
    depends_on: [planning-service-db, timesheet-service]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4010/actuator/health/readiness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  payroll-service:
    build:
      context: ./payroll-service
      dockerfile: Dockerfile
    image: payroll-service:latest
    environment:
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      # S1: token sent on calls to user-service /public/** (must match user-service).
      INTERNAL_SERVICE_TOKEN: "${INTERNAL_SERVICE_TOKEN:-}"
      PAYSLIP_PAYOUT_DAY: "SUNDAY"
      PAYSLIP_PAYOUT_TIME: "12:00"
      PAYSLIP_TIME_ZONE: "Europe/Amsterdam"
      PAYSLIP_REVIEW_LEAD_DAYS: "2"
      CONTRACT_SERVICE_ADDRESS: "contract-service"
      CONTRACT_SERVICE_GRPC: "9002"
      TIMESHEET_SERVICE_ADDRESS: "timesheet-service"
      TIMESHEET_SERVICE_GRPC: "9001"
      USER_SERVICE_ADDRESS: "user-service"
      USER_SERVICE_GRPC: "9006"
      USER_SERVICE_BASE_URL: "http://user-service:4006"
      SPRING_DATASOURCE_PASSWORD: "${PAYROLL_SERVICE_DB_PASSWORD:?PAYROLL_SERVICE_DB_PASSWORD must be set}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://payroll-service-db:5432/db"
      SPRING_DATASOURCE_USERNAME: "admin_user"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      SPRING_SQL_INIT_MODE: "never"
    depends_on: [payroll-service-db, contract-service, timesheet-service, user-service, kafka]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/actuator/health/readiness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: api-gateway:latest
    environment:
      # S2: gateway validates access-token signatures locally, so it needs the same
      # JWT secret as auth-service.
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      AUTH_SERVICE_URL: "http://auth-service:4005"
      USER_SERVICE_URL: "http://user-service:4006"
      CONTRACT_SERVICE_URL: "http://contract-service:4002"
      PAYROLL_SERVICE_URL: "http://payroll-service:4000"
      PLANNING_SERVICE_URL: "http://planning-service:4010"
      TIMESHEET_SERVICE_URL: "http://timesheet-service:4001"
      FRONTEND_ORIGIN: "${FRONTEND_ORIGIN:-http://localhost:5173}"
    ports: ["4004:4004"]
    depends_on: [auth-service]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4004/actuator/health/readiness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  tls-proxy:
    image: nginx:1.27-alpine
    profiles: ["tls"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./deploy/nginx/paradepaard.conf:/etc/nginx/conf.d/default.conf:ro"
      - "${TLS_CERT_PATH:?TLS_CERT_PATH must be set}:/etc/nginx/certs/tls.crt:ro"
      - "${TLS_KEY_PATH:?TLS_KEY_PATH must be set}:/etc/nginx/certs/tls.key:ro"
    depends_on: [api-gateway]

  postgres-backup:
    image: postgres:16.4
    profiles: ["backup"]
    environment:
      BACKUP_INTERVAL_SECONDS: "${BACKUP_INTERVAL_SECONDS:-86400}"
      AUTH_SERVICE_DB_PASSWORD: "${AUTH_SERVICE_DB_PASSWORD:?AUTH_SERVICE_DB_PASSWORD must be set}"
      USER_SERVICE_DB_PASSWORD: "${USER_SERVICE_DB_PASSWORD:?USER_SERVICE_DB_PASSWORD must be set}"
      PAYROLL_SERVICE_DB_PASSWORD: "${PAYROLL_SERVICE_DB_PASSWORD:?PAYROLL_SERVICE_DB_PASSWORD must be set}"
      TIMESHEET_SERVICE_DB_PASSWORD: "${TIMESHEET_SERVICE_DB_PASSWORD:?TIMESHEET_SERVICE_DB_PASSWORD must be set}"
      CONTRACT_SERVICE_DB_PASSWORD: "${CONTRACT_SERVICE_DB_PASSWORD:?CONTRACT_SERVICE_DB_PASSWORD must be set}"
      PLANNING_SERVICE_DB_PASSWORD: "${PLANNING_SERVICE_DB_PASSWORD:?PLANNING_SERVICE_DB_PASSWORD must be set}"
    volumes:
      - "postgres_backups:/backups"
      - "./deploy/postgres-backup:/scripts:ro"
    entrypoint: ["/bin/sh", "/scripts/backup-loop.sh"]
    depends_on:
      auth-service-db:
        condition: service_healthy
      user-service-db:
        condition: service_healthy
      payroll-service-db:
        condition: service_healthy
      timesheet-service-db:
        condition: service_healthy
      contract-service-db:
        condition: service_healthy
      planning-service-db:
        condition: service_healthy

volumes:
  auth_db_data: {}
  user_db_data: {}
  payroll_db_data: {}
  timesheet_db_data: {}
  contract_db_data: {}
  planning_db_data: {}
  postgres_backups: {}
