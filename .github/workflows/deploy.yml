name: Deploy to production

# Phase 2 of the CI/CD plan (see TODO/TODO/ci-cd.txt).
# MANUAL gate: production only deploys when you click "Run workflow" and choose an
# image tag. The workflow copies the compose files to the Droplet (so the Droplet
# never needs to pull the private repo), pulls the pre-built GHCR images, starts
# them, health-checks the gateway, and rolls back to the previous tag on failure.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Leave as 'latest' to deploy the current main commit; or enter a specific commit SHA to roll back."
        required: true
        default: latest

# Never let two production deploys overlap.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    env:
      # Directory ON THE DROPLET that holds the compose files + the .env + certs
      # (the same place you run `docker compose ... up` by hand). It already has
      # the base repo checkout; we only refresh the compose/nginx files below.
      DEPLOY_DIR: /root/ParadePaard/Program/microservice
      # Deploy by a CONCRETE commit SHA, never the floating 'latest' — so the tag
      # recorded for rollback points at a real, immutable image set. 'latest'
      # (the default) resolves to the current main commit being deployed.
      TAG: ${{ (github.event.inputs.image_tag == 'latest' || github.event.inputs.image_tag == '') && github.sha || github.event.inputs.image_tag }}
      GHCR_USER: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      # Ship the compose + nginx files this release needs straight to the Droplet,
      # so the deploy does NOT depend on the Droplet being able to pull the
      # (private) repo. strip_components drops the "Program/microservice/" prefix
      # so files land at $DEPLOY_DIR/... in the same layout.
      - name: Copy compose + nginx files to the Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "Program/microservice/docker-compose.yml,Program/microservice/docker-compose.prod.yml,Program/microservice/docker-compose.registry.yml,Program/microservice/deploy/nginx/paradepaard.conf,Program/microservice/deploy/nginx/paradepaard.image.conf"
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 2
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: DEPLOY_DIR,TAG,GHCR_USER,GHCR_TOKEN
          script: |
            set -eu
            cd "$DEPLOY_DIR"

            COMPOSE="-f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.registry.yml --profile tls"

            # 1. Authenticate to GHCR so the private images can be pulled.
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # 2. Remember the currently-deployed tag for rollback.
            PREV_TAG="$(cat .deployed_tag 2>/dev/null || echo '')"

            # 3. Pull the new images and start them (never build on the box).
            TAG="$TAG" docker compose $COMPOSE pull
            TAG="$TAG" docker compose $COMPOSE up -d --no-build --remove-orphans

            # The backend containers were recreated with new IPs, but nginx caches
            # upstream IPs at start-up — so restart the tls-proxy to re-resolve them.
            # Without this the public site 502s even though the gateway is healthy.
            docker compose $COMPOSE restart tls-proxy

            # 4. Health-gate: gateway readiness (direct) AND the public path works
            # THROUGH the tls-proxy — so a stale-proxy / frontend 502 fails the
            # deploy instead of silently passing.
            ok=0
            for _ in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:4004/actuator/health/readiness >/dev/null 2>&1 \
                 && curl -fsS -k -o /dev/null https://127.0.0.1/ -H 'Host: lambdamanager.com' 2>/dev/null; then
                ok=1; break
              fi
              sleep 5
            done

            if [ "$ok" = "1" ]; then
              echo "$TAG" > .deployed_tag
              echo "Deploy OK at tag: $TAG"
            else
              echo "Gateway did not become ready — rolling back."
              if [ -n "$PREV_TAG" ]; then
                TAG="$PREV_TAG" docker compose $COMPOSE up -d --no-build
                echo "Rolled back to: $PREV_TAG"
              else
                echo "No previous tag recorded; leaving as-is for manual inspection."
              fi
              exit 1
            fi
