server:
  port: 4004
  forward-headers-strategy: framework

gateway:
  security:
    require-https: ${GATEWAY_REQUIRE_HTTPS:false}
    hsts-enabled: ${GATEWAY_HSTS_ENABLED:false}
    hsts-max-age: ${GATEWAY_HSTS_MAX_AGE:365d}

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://auth-service:4005}

# S2: shared HS256 secret so the gateway can validate access-token signatures locally
# instead of calling auth-service on every request. Must be the SAME value as
# auth-service's JWT_SECRET. Provided via env — the compose/deploy config must pass
# JWT_SECRET to api-gateway (see B1 secret wiring).
jwt:
  secret: ${JWT_SECRET}

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration
      # S6/S2: actuator pulls in reactive management security, which needs a
      # ServerHttpSecurity bean we don't define (security auto-config is excluded above).
      - org.springframework.boot.actuate.autoconfigure.security.reactive.ReactiveManagementWebSecurityAutoConfiguration

  cloud:
    gateway:
      server:
        webflux:
          # CORS for browser calls through the gateway
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              "[/**]":
                allowed-origins:
                  - "${FRONTEND_ORIGIN:http://localhost:5173}"
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowed-headers:
                  - "*"
                allow-credentials: true
                max-age: 3600

          # make sure the browser sees only one CORS header value
          default-filters:
            - name: DedupeResponseHeader
              args:
                name: Access-Control-Allow-Origin
                strategy: RETAIN_FIRST
            - name: DedupeResponseHeader
              args:
                name: Access-Control-Allow-Credentials
                strategy: RETAIN_FIRST

          routes:
            # Auth service public endpoints
            - id: auth-service-login
              uri: ${AUTH_SERVICE_URL:http://auth-service:4005}
              predicates:
                - Path=/auth/login
              filters:
                - StripPrefix=1

            - id: auth-service-register
              uri: ${AUTH_SERVICE_URL:http://auth-service:4005}
              predicates:
                - Path=/auth/register
              filters:
                - StripPrefix=1

            - id: auth-service-forgot-password
              uri: ${AUTH_SERVICE_URL:http://auth-service:4005}
              predicates:
                - Path=/auth/forgot-password
              filters:
                - StripPrefix=1

            - id: auth-service-reset-password
              uri: ${AUTH_SERVICE_URL:http://auth-service:4005}
              predicates:
                - Path=/auth/reset-password
              filters:
                - StripPrefix=1

            - id: auth-service-refresh
              uri: ${AUTH_SERVICE_URL:http://auth-service:4005}
              predicates:
                - Path=/auth/refresh
              filters:
                - StripPrefix=1

            - id: auth-service-validate
              uri: ${AUTH_SERVICE_URL:http://auth-service:4005}
              predicates:
                - Path=/auth/validate
              filters:
                - StripPrefix=1

            - id: auth-service-logout
              uri: ${AUTH_SERVICE_URL:http://auth-service:4005}
              predicates:
                - Path=/auth/logout
              filters:
                - StripPrefix=1

            # Auth service protected endpoints
            - id: auth-service-protected
              uri: ${AUTH_SERVICE_URL:http://auth-service:4005}
              predicates:
                - Path=/auth/is-admin,/auth/change-password,/auth/profile,/auth/me,/auth/permissions,/auth/platform/company-scope
              filters:
                - StripPrefix=1
                - JwtValidation

            # Auth service admin endpoints
            - id: auth-service-admin
              uri: ${AUTH_SERVICE_URL:http://auth-service:4005}
              predicates:
                - Path=/auth/admin/**
              filters:
                - StripPrefix=1
                - JwtValidation

            # Auth swagger
            - id: api-docs-auth-route
              uri: ${AUTH_SERVICE_URL:http://auth-service:4005}
              predicates:
                - Path=/api-docs/auth
              filters:
                - RewritePath=/api-docs/auth,/v3/api-docs

            # User service protected endpoints
            - id: user-service-public-applications
              uri: ${USER_SERVICE_URL:http://user-service:4006}
              predicates:
                - Path=/api/applications
              filters:
                - StripPrefix=1

            - id: user-service-route
              uri: ${USER_SERVICE_URL:http://user-service:4006}
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=1
                - JwtValidation

            # User service endpoints
            - id: user-service-user-route
              uri: ${USER_SERVICE_URL:http://user-service:4006}
              predicates:
                - Path=/api/user/**
              filters:
                - StripPrefix=1
                - JwtValidation

            - id: user-service-admin-route
              uri: ${USER_SERVICE_URL:http://user-service:4006}
              predicates:
                - Path=/api/admin/**
              filters:
                - StripPrefix=1
                - JwtValidation

            # leave requests through user service
            - id: user-service-leave-requests
              uri: ${USER_SERVICE_URL:http://user-service:4006}
              predicates:
                - Path=/api/leave-requests/**
              filters:
                - StripPrefix=1
                - JwtValidation

            # User service shared messages
            - id: user-service-messages
              uri: ${USER_SERVICE_URL:http://user-service:4006}
              predicates:
                - Path=/api/messages/**
              filters:
                - StripPrefix=1
                - JwtValidation

            # CAO templates through user service
            - id: user-service-cao-route
              uri: ${USER_SERVICE_URL:http://user-service:4006}
              predicates:
                - Path=/api/cao/**
              filters:
                - StripPrefix=1
                - JwtValidation

            # User swagger
            - id: api-docs-user-route
              uri: ${USER_SERVICE_URL:http://user-service:4006}
              predicates:
                - Path=/api-docs/user
              filters:
                - RewritePath=/api-docs/user,/v3/api-docs

            # Payroll service protected endpoints
            - id: payroll-service-route
              uri: ${PAYROLL_SERVICE_URL:http://payroll-service:4000}
              predicates:
                - Path=/api/payroll/**
              filters:
                - StripPrefix=1
                - JwtValidation

            # Payroll swagger
            - id: api-docs-payroll-route
              uri: ${PAYROLL_SERVICE_URL:http://payroll-service:4000}
              predicates:
                - Path=/api-docs/payroll
              filters:
                - RewritePath=/api-docs/payroll,/v3/api-docs

            # Timesheet service protected endpoints
            - id: timesheet-service-route
              uri: ${TIMESHEET_SERVICE_URL:http://timesheet-service:4001}
              predicates:
                - Path=/api/timesheet/**
              filters:
                - StripPrefix=1
                - JwtValidation

            # Timesheet swagger
            - id: api-docs-timesheet-route
              uri: ${TIMESHEET_SERVICE_URL:http://timesheet-service:4001}
              predicates:
                - Path=/api-docs/timesheet
              filters:
                - RewritePath=/api-docs/timesheet,/v3/api-docs

            # Contract service protected endpoints
            - id: contract-service-route
              uri: ${CONTRACT_SERVICE_URL:http://contract-service:4002}
              predicates:
                - Path=/api/contract/**
              filters:
                - StripPrefix=1
                - JwtValidation

            # Planning service protected endpoints
            - id: planning-service-route
              uri: ${PLANNING_SERVICE_URL:http://planning-service:4010}
              predicates:
                - Path=/api/planning/**
              filters:
                - StripPrefix=1
                - JwtValidation

            # Contract swagger
            - id: api-docs-contract-route
              uri: ${CONTRACT_SERVICE_URL:http://contract-service:4002}
              predicates:
                - Path=/api-docs/contract
              filters:
                - RewritePath=/api-docs/contract,/v3/api-docs

            # Planning swagger
            - id: api-docs-planning-route
              uri: ${PLANNING_SERVICE_URL:http://planning-service:4010}
              predicates:
                - Path=/api-docs/planning
              filters:
                - RewritePath=/api-docs/planning,/v3/api-docs

logging:
  level:
    org.springframework.cloud.gateway: ${GATEWAY_LOG_LEVEL:INFO}
    org.springframework.web.cors: ${CORS_LOG_LEVEL:INFO}
    ROOT: ${ROOT_LOG_LEVEL:INFO}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
