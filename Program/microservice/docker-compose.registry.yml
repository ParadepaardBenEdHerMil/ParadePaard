# CI/CD Phase 2 overlay (see TODO/TODO/ci-cd.txt).
#
# Runs the stack from pre-built GHCR images instead of building on the box, and
# serves the frontend from its own image instead of the ../frontend/dist bind
# mount. Layer it LAST, on top of the base + prod files:
#
#   TAG=<sha|latest> docker compose \
#     -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.registry.yml \
#     --profile tls pull
#   TAG=<sha|latest> docker compose \
#     -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.registry.yml \
#     --profile tls up -d --no-build --remove-orphans
#
# Roll back a bad release: set TAG to an earlier commit SHA and re-run `up`.
# Roll back the WHOLE model to build-on-box: drop this `-f docker-compose.registry.yml`
# and run the old command (the old frontend dist bind mount is restored).

services:
  auth-service:      { image: "ghcr.io/paradepaardbenedhermil/paradepaard/auth-service:${TAG:-latest}" }
  user-service:      { image: "ghcr.io/paradepaardbenedhermil/paradepaard/user-service:${TAG:-latest}" }
  timesheet-service: { image: "ghcr.io/paradepaardbenedhermil/paradepaard/timesheet-service:${TAG:-latest}" }
  contract-service:  { image: "ghcr.io/paradepaardbenedhermil/paradepaard/contract-service:${TAG:-latest}" }
  planning-service:  { image: "ghcr.io/paradepaardbenedhermil/paradepaard/planning-service:${TAG:-latest}" }
  payroll-service:   { image: "ghcr.io/paradepaardbenedhermil/paradepaard/payroll-service:${TAG:-latest}" }
  api-gateway:       { image: "ghcr.io/paradepaardbenedhermil/paradepaard/api-gateway:${TAG:-latest}" }

  # The built React app, served by its own nginx. Replaces the dist bind mount.
  # Not published publicly — the tls-proxy fronts it on 80/443.
  frontend:
    image: "ghcr.io/paradepaardbenedhermil/paradepaard/frontend:${TAG:-latest}"
    restart: unless-stopped
    expose:
      - "80"

  # Point the TLS front door at the frontend container instead of a mounted dist
  # folder. `!override` replaces the volume list merged from the base + prod files
  # (drops ../frontend/dist and swaps in the proxy-mode nginx config).
  tls-proxy:
    depends_on:
      - api-gateway
      - frontend
    volumes: !override
      - "./deploy/nginx/paradepaard.image.conf:/etc/nginx/conf.d/default.conf:ro"
      - "${TLS_CERT_PATH:?TLS_CERT_PATH must be set}:/etc/nginx/certs/tls.crt:ro"
      - "${TLS_KEY_PATH:?TLS_KEY_PATH must be set}:/etc/nginx/certs/tls.key:ro"
