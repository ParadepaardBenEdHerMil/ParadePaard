# Serves the built React single-page app. This nginx sits BEHIND the tls-proxy,
# which still terminates TLS and proxies /api, /auth and /api-docs to the
# gateway — so this server only serves static files.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Vite emits content-hashed files under /assets/ — safe to cache forever.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The HTML entrypoint must never be cached, or clients pin to an old bundle.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: unknown paths are client-side routes -> serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
