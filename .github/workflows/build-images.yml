name: Build & publish images

# Phase 1 of the CI/CD plan (see TODO/TODO/ci-cd.txt).
# On every push to main (and on manual dispatch), build the 7 backend services
# and the frontend as Docker images and push them to GHCR, tagged with the
# commit SHA (immutable, so we can always answer "what is running?") and :latest.
# Uses the built-in GITHUB_TOKEN — no extra credentials.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Do NOT cancel in-progress publishes: each commit's SHA-tagged images must
# finish publishing so they stay available as rollback targets. Rapid merges
# queue instead of cancelling each other.
concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_PREFIX: ghcr.io/paradepaardbenedhermil/paradepaard

jobs:
  backend:
    name: image (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - contract-service
          - payroll-service
          - timesheet-service
          - planning-service
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (with retry)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          # GHCR intermittently times out the token request on runners
          # ("context deadline exceeded"); retry with linear backoff instead of
          # failing the whole build on a transient blip. docker login writes the
          # credentials that the later build-push step reuses.
          for attempt in 1 2 3 4 5; do
            if echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin; then
              exit 0
            fi
            echo "GHCR login attempt $attempt failed; retrying in $((attempt * 10))s..."
            sleep $((attempt * 10))
          done
          echo "GHCR login failed after 5 attempts" >&2
          exit 1

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: Program/microservice/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  frontend:
    name: image (frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (with retry)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          # GHCR intermittently times out the token request on runners
          # ("context deadline exceeded"); retry with linear backoff instead of
          # failing the whole build on a transient blip. docker login writes the
          # credentials that the later build-push step reuses.
          for attempt in 1 2 3 4 5; do
            if echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin; then
              exit 0
            fi
            echo "GHCR login attempt $attempt failed; retrying in $((attempt * 10))s..."
            sleep $((attempt * 10))
          done
          echo "GHCR login failed after 5 attempts" >&2
          exit 1

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: Program/frontend
          push: true
          # Empty = same-origin relative "/api" calls, so one image serves both
          # staging and production behind the nginx proxy. See the frontend
          # Dockerfile for the full rationale (fixes the P1-6 localhost footgun).
          build-args: |
            VITE_API_BASE_URL=
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
